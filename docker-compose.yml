services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mapscribe_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@mapscribe_db:5432/mapscribe_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mapscribe_net

  db:
    image: postgres:15-alpine
    container_name: mapscribe_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mapscribe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mapscribe_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mapscribe_net

volumes:
  postgres_data:

networks:
  mapscribe_net:
    driver: bridge
